syntax = "proto3";

option csharp_namespace = "Mansari.Store.Contracts.Ordering";

service OrderingService {
  rpc GetOrderById (GetOrderRequest) returns (OrderResponse);
}

message GetOrderRequest {
  string id = 1;
}

message OrderResponse {
  string id = 1;
  string bookId = 2;
  int32 quantity = 3;
  string status = 4;
}
